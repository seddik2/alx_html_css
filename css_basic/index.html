<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Layout</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="works_on_smartphone">
    <header>
        <div class="logo">&hearts;</div> <!-- Using a heart symbol as a logo -->
        Content of the &lt;header&gt; tag
    </header>
    <main>
        <article>
            <h1>Article Heading</h1>
            <p>This is a paragraph inside the article.</p>
            <p>More content can be added here.</p>
        </article>
        <aside>Content of the &lt;aside&gt; tag</aside>
    </main>
    <footer>Content of the &lt;footer&gt; tag</footer>
</body>
</html>
